<!DOCTYPE html>
<html>
<head>
    <title>Q4 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    
</head>
<body class="main-bg">

    <div id="check_card">
        
        <h1 id="title_text">Heat Index Checker</h1>

        <p id="info_text">Input the temperature (&deg;C) and humidity (%), then click Check to see the heat index and its status.</p>

        <div class="input-container">
            <label class="label-text">TEMPERATURE (C)</label>
            <input type="number" id="temp_input" class="input_field" placeholder="0">

            <label class="label-text">HUMIDITY (%)</label>
            <input type="number" id="humid_input" class="input_field" placeholder="0">

            <button onclick="checkHeat()" class="btn_action">Check Status</button>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
